server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Assets con caché larga (Vite genera nombres con hash)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Todo lo demás → index.html (React Router SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
