events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Compresión
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    # Logging
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Upstream: API Node.js
    upstream botpay_api {
        server botpay-api:4000;
        keepalive 32;
    }

    # Upstream: Frontend React (contenedor)
    upstream botpay_frontend {
        server botpay-frontend:80;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;

        # ── API REST ──────────────────────────────────────
        location /api/ {
            proxy_pass         http://botpay_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
        }

        # ── Webhook Meta (no buffering para HMAC) ─────────
        location /api/webhook/ {
            proxy_pass              http://botpay_api;
            proxy_http_version      1.1;
            proxy_set_header        Host        $host;
            proxy_set_header        X-Real-IP   $remote_addr;
            proxy_request_buffering off;
        }

        # ── Socket.io (WebSocket upgrade) ────────────────
        location /socket.io/ {
            proxy_pass         http://botpay_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Frontend React (SPA) ──────────────────────────
        location / {
            proxy_pass         http://botpay_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;

            # Cache para assets estáticos
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                proxy_pass         http://botpay_frontend;
                proxy_cache_bypass $http_upgrade;
                add_header         Cache-Control "public, max-age=31536000, immutable";
            }
        }
    }
}
